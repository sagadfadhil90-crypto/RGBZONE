<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB ZONE | استعادة كلمة المرور</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-particles"></div>

    <div class="login-wrapper">
        <div class="login-card">
            <div class="avatar-container">
                <div class="cyber-robot" id="cyberRobot">
                    <div class="robot-eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                </div>
            </div>

            <a href="index.html" class="logo-link" style="display: block; text-align: center; margin-bottom: 25px;"><h2 class="logo">RGB <span>ZONE</span></h2></a>
            
            <div id="statusMsg" style="text-align: center; font-size: 14px; margin-bottom: 15px; font-weight: bold; min-height: 20px;"></div>

            <form id="forgotForm">
                <p style="text-align: center; color: #ccc; font-size: 14px; margin-bottom: 20px;">أدخل بريدك والرمز الجديد لتحديث كلمة الحساب فوراً.</p>
                <div class="input-group">
                    <input type="email" id="forgotEmail" placeholder="البريد الإلكتروني للاعب" required>
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="input-group">
                    <input type="password" id="newPasswordInput" placeholder="كلمة المرور الجديدة" required>
                    <i class="fas fa-key"></i>
                </div>
                <button type="submit" class="login-btn">تحديث كلمة السر <i class="fas fa-sync-alt"></i></button>
                <div class="login-links"><a href="login.html"><i class="fas fa-arrow-right"></i> العودة لتسجيل الدخول</a></div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
