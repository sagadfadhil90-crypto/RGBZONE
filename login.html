<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB ZONE | تسجيل الدخول</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="bg-particles"></div>

    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="avatar-container">
                <div class="cyber-robot" id="cyberRobot">
                    <div class="robot-eyes">
                        <div class="eye"></div>
                        <div class="eye"></div>
                    </div>
                </div>
            </div>

            <a href="index.html" class="logo-link"><h2 class="logo" style="margin-bottom: 30px;">RGB <span>ZONE</span></h2></a>
            
            <div id="statusMsg" style="text-align: center; font-size: 14px; margin-bottom: 15px; font-weight: bold; min-height: 20px;"></div>

            <form id="loginForm">
                <div class="auth-group">
                    <input type="email" id="emailInput" placeholder="البريد الإلكتروني للاعب" required>
                    <i class="fas fa-envelope"></i>
                </div>
                <div class="auth-group">
                    <input type="password" id="passwordInput" placeholder="كلمة المرور" required>
                    <i class="fas fa-lock"></i>
                </div>
                <button type="submit" class="auth-btn">تسجيل الدخول للمتجر <i class="fas fa-door-open"></i></button>
                <div class="auth-links">
                    <a href="forgot-password.html">نسيت السر؟</a>
                    <a href="register.html" style="color: var(--neon-cyan);">إنشاء حساب جديد</a>
                </div>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
